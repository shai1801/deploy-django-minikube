name: Reject Pull Requests

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  reject:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Close pull request with a comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: "Thank you for your contribution! Unfortunately, this repository does not accept pull requests at this time. This PR will be closed automatically."
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed"
            });
