apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
# Values are base64-encoded. To generate: echo -n 'value' | base64
# Default values below are for local/dev use only — replace in production.
# djangouser       -> ZGphbmdvdXNlcg==
# djangopassword   -> ZGphbmdvcGFzc3dvcmQ=
# djangodb         -> ZGphbmdvZGI=
# (replace DJANGO_SECRET_KEY with a long random string before production use)
data:
  POSTGRES_USER: ZGphbmdvdXNlcg==
  POSTGRES_PASSWORD: ZGphbmdvcGFzc3dvcmQ=
  POSTGRES_DB: ZGphbmdvZGI=
  DB_PASSWORD: ZGphbmdvcGFzc3dvcmQ=
  DJANGO_SECRET_KEY: aW5zZWN1cmUtZGV2LW9ubHktc2VjcmV0LWtleS1jaGFuZ2UtbWU=
